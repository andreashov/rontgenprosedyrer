<!DOCTYPE html>
<html lang="no" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bildediagnostikk – Sykehuset Østfold</title>
<link rel="icon" type="image/x-icon" href="https://andreashov.github.io/rontgenprosedyrer/favicon/favicon.ico">
<link rel="icon" type="image/svg+xml" href="https://andreashov.github.io/rontgenprosedyrer/favicon/favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="https://andreashov.github.io/rontgenprosedyrer/favicon/favicon-96x96.png">
<link rel="apple-touch-icon" sizes="180x180" href="https://andreashov.github.io/rontgenprosedyrer/favicon/apple-touch-icon.png">
<link rel="manifest" href="https://andreashov.github.io/rontgenprosedyrer/favicon/site.webmanifest">
<style>
:root{
  --bg:#f0f4f9;--surface:#fff;--surface2:#f7f9fc;--border:#dde3ec;
  --text:#0d1b2e;--text2:#4a5a72;--text3:#8a97aa;
  --accent:#1a4f8a;--accent-light:#dbeafe;--dot-empty:#c8d4e3;
  --mark-bg:#fef08a;--shadow:0 1px 4px rgba(0,0,0,.07);
}
[data-theme="dark"]{
  --bg:#0c1520;--surface:#111e2e;--surface2:#162030;--border:#1e3045;
  --text:#e8edf5;--text2:#94a8c0;--text3:#4a6070;
  --accent:#4a9de0;--accent-light:#1a2d45;--dot-empty:#2a3d52;
  --mark-bg:#78530a;--shadow:0 1px 6px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden;max-width:480px;margin:0 auto;width:100%}

.topbar{display:flex;align-items:center;gap:10px;padding:0 12px;height:44px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.logo-wrap{display:flex;align-items:center;gap:7px}
.logo-text{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.04em;text-transform:uppercase}
.logo-sub{font-size:8px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.topbar-right{margin-left:auto}
.theme-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.theme-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

.fixed-header{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border)}

.modalitet-bar{display:flex;padding:7px 10px;border-bottom:1px solid var(--border);background:var(--surface)}
.mod-slider-track{display:flex;flex:1;background:var(--surface2);border-radius:10px;padding:3px;position:relative;border:1px solid var(--border);gap:0}
.mod-slider-thumb{position:absolute;top:3px;bottom:3px;border-radius:8px;background:transparent;border:2px solid var(--accent);box-shadow:0 0 0 1px var(--accent-light),0 2px 8px rgba(26,79,138,.25);transition:left .25s cubic-bezier(.34,1.4,.64,1),width .25s cubic-bezier(.34,1.4,.64,1);z-index:0;pointer-events:none}
.mod-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;border:none;background:transparent;cursor:pointer;transition:transform .15s;flex:1;min-width:0;overflow:hidden;position:relative;padding:3px;aspect-ratio:4/3;z-index:1}
.mod-btn:active{transform:scale(.93)}
.mod-img-wrap{position:absolute;inset:0;border-radius:7px;overflow:hidden}
.mod-img{width:100%;height:100%;object-fit:cover;display:block;image-rendering:auto;opacity:.75;transition:opacity .2s}
.mod-btn.on .mod-img{opacity:1}
.mod-label{display:none}

.sub-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 10px;background:var(--surface2)}
.sub-tab{padding:8px 12px;font-size:11px;font-weight:600;color:var(--text3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.sub-tab.on{color:var(--accent);border-bottom-color:var(--accent)}

.pt-tabs-bar{display:flex;padding:7px 10px;border-bottom:1px solid var(--border);background:var(--surface)}
.slider-track{display:flex;flex:1;background:var(--surface2);border-radius:9px;padding:3px;position:relative;border:1px solid var(--border)}
.slider-thumb{position:absolute;top:3px;bottom:3px;border-radius:7px;background:var(--accent);transition:left .22s cubic-bezier(.34,1.56,.64,1),width .22s cubic-bezier(.34,1.56,.64,1),background .2s;z-index:0;box-shadow:0 2px 6px rgba(0,0,0,.18)}
.ptab{flex:1;padding:6px 0;border-radius:7px;border:none;background:transparent;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;transition:color .2s;text-align:center;position:relative;z-index:1}
.ptab:hover{color:var(--text2)}
.ptab.on{color:#fff}

.search-bar{padding:7px 10px;border-bottom:1px solid var(--border);background:var(--surface)}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:7px 10px 7px 32px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface2);font-size:16px;color:var(--text);outline:none;height:34px}
.search-wrap input::placeholder{color:var(--text3);font-size:13px}
.search-wrap input:focus{border-color:var(--accent)}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--text3);fill:none;stroke-width:2;pointer-events:none}

.scroll-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll-content::-webkit-scrollbar{width:3px}
.scroll-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.panel-section{display:none;flex-direction:column;flex:1;overflow:hidden}
.panel-section.active{display:flex}

.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 10px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:4px;min-height:64px;position:relative;overflow:hidden}
.cat-card:hover{background:var(--accent-light);border-color:var(--accent)}
.cat-card-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.cat-card-label{font-size:12px;font-weight:700;color:var(--text);line-height:1.3;margin-top:4px}
.cat-card-count{font-size:10px;color:var(--text3)}

.proc-view{display:none;flex-direction:column;flex:1;overflow:hidden}
.proc-view.active{display:flex}
.back-bar{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0}
.back-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface);font-size:11px;font-weight:600;color:var(--text2);cursor:pointer}
.back-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5}
.back-cat-name{font-size:12px;font-weight:700;color:var(--text);flex:1}
.prow{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border);min-height:44px}
.prow:hover{background:var(--surface2)}
.prow.active{background:var(--accent-light)}
.pname{font-size:13px;color:var(--text2);flex:1;line-height:1.35}
.prow.active .pname{color:var(--accent);font-weight:600}
.has-link{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;opacity:.7}
.no-link{width:5px;height:5px;border-radius:50%;background:var(--dot-empty);flex-shrink:0}
.no-results{padding:2rem 10px;text-align:center;font-size:13px;color:var(--text3)}

.logg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px}
.lab-card{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:14px 10px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;text-align:center;min-height:52px}
.lab-card:hover{background:var(--accent-light);border-color:var(--accent)}
.lab-card-name{font-size:13px;font-weight:700;color:var(--text)}

.coming-soon{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text3);padding:2rem;text-align:center}
.coming-soon svg{opacity:.35;stroke:var(--text3)}
.coming-soon h2{font-size:15px;font-weight:600;color:var(--text2)}
.coming-soon p{font-size:12px;line-height:1.6;max-width:260px}

/* ANIMASJONER */
@keyframes popIn{0%{transform:scale(.94);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{0%{transform:translateY(12px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes slideInRight{0%{transform:translateX(120px);opacity:0}100%{transform:translateX(0);opacity:1}}
@keyframes slideInLeft{0%{transform:translateX(-120px);opacity:0}100%{transform:translateX(0);opacity:1}}
@keyframes rowFlash{0%{background:var(--accent);transform:scaleX(1.01)}40%{background:var(--accent-light)}100%{background:transparent;transform:scaleX(1)}}

.cat-card{transition:background .15s,border-color .15s,transform .12s}
.cat-card:active{transform:scale(.96)}

.prow{animation:slideUp .15s ease both}
.prow:nth-child(2){animation-delay:.03s}
.prow:nth-child(3){animation-delay:.06s}
.prow:nth-child(4){animation-delay:.09s}
.prow:nth-child(5){animation-delay:.12s}
.prow:nth-child(6){animation-delay:.15s}
.prow:nth-child(7){animation-delay:.18s}
.prow:nth-child(8){animation-delay:.21s}
.prow:nth-child(9){animation-delay:.24s}
.prow:nth-child(10){animation-delay:.27s}
.prow:active{background:var(--accent-light)}

.mod-btn{transition:transform .15s ease,border-color .15s,box-shadow .15s}
.mod-btn:active{transform:scale(.93)}

.ptab{transition:background .15s,border-color .15s,color .15s,transform .1s}
.ptab:active{transform:scale(.95)}

.sub-tab{transition:color .15s,border-color .15s}

.lab-card{transition:background .15s,border-color .15s,transform .12s}
.lab-card:active{transform:scale(.97)}

.back-btn{transition:background .15s,border-color .15s,color .15s,transform .1s}
.back-btn:active{transform:scale(.95)}

.panel-section.active{animation:fadeIn .2s ease}
.panel-section.slide-right{animation:slideInRight .28s cubic-bezier(.2,.8,.3,1) both}
.panel-section.slide-left{animation:slideInLeft .28s cubic-bezier(.2,.8,.3,1) both}
.prow.flash{animation:rowFlash .5s ease forwards;color:#fff}

@media(max-width:640px){
  body{height:auto;min-height:100vh;overflow:auto;max-width:100%}
  .panel-section.active{min-height:200px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-wrap">
    <svg width="26" height="26" viewBox="0 0 34 34" fill="none">
      <circle cx="8" cy="8" r="5.5" fill="#5bb3e8"/>
      <circle cx="22" cy="8" r="4.5" fill="#5bb3e8" opacity=".6"/>
      <circle cx="8" cy="22" r="4.5" fill="#1a4f8a"/>
      <circle cx="22" cy="22" r="3.5" fill="#1a4f8a" opacity=".7"/>
    </svg>
    <div>
      <div class="logo-text">Sykehuset Østfold</div>
      <div class="logo-sub">Bildediagnostikk</div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="theme-btn" onclick="toggleTheme()">
      <svg id="theme-ico" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
  </div>
</div>

<div class="fixed-header">
  <div class="modalitet-bar">
    <div class="mod-slider-track" id="mod-slider-track">
      <div class="mod-slider-thumb" id="mod-slider-thumb"></div>
      <button class="mod-btn on" onclick="setMod('rg',this)">
        <div class="mod-img-wrap"><img class="mod-img" src="https://andreashov.github.io/rontgenprosedyrer/modalitet-symbol/røntgen.png" onerror="this.style.display='none'" alt=""></div>
      </button>
      <button class="mod-btn" onclick="setMod('ct',this)">
        <div class="mod-img-wrap"><img class="mod-img" src="https://andreashov.github.io/rontgenprosedyrer/modalitet-symbol/ct.png" onerror="this.style.display='none'" alt=""></div>
      </button>
      <button class="mod-btn" onclick="setMod('ul',this)">
        <div class="mod-img-wrap"><img class="mod-img" src="https://andreashov.github.io/rontgenprosedyrer/modalitet-symbol/ultralyd.png" onerror="this.style.display='none'" alt=""></div>
      </button>
      <button class="mod-btn" onclick="setMod('gj',this)">
        <div class="mod-img-wrap"><img class="mod-img" src="https://andreashov.github.io/rontgenprosedyrer/modalitet-symbol/gjennomlysning.png" onerror="this.style.display='none'" alt=""></div>
      </button>
      <button class="mod-btn" onclick="setMod('an',this)">
        <div class="mod-img-wrap"><img class="mod-img" src="https://andreashov.github.io/rontgenprosedyrer/modalitet-symbol/angio.png" onerror="this.style.display='none'" alt=""></div>
      </button>
    </div>
  </div>

  <!-- SUB TABS -->
  <div id="sub-tabs-rg" class="sub-tabs">
    <button class="sub-tab on" onclick="setSubTab('pros',this)">📋 Prosedyrer</button>
    <button class="sub-tab" onclick="setSubTab('logg',this)">📒 Loggbøker</button>
  </div>
  <div id="sub-tabs-ct" class="sub-tabs" style="display:none">
    <button class="sub-tab on" onclick="setSubTab('prot',this)">📑 Protokoller</button>
    <button class="sub-tab" onclick="setSubTab('pros',this)">📋 Prosedyrer</button>
    <button class="sub-tab" onclick="setSubTab('logg',this)">📒 Loggbøker</button>
  </div>
  <div id="sub-tabs-other" class="sub-tabs" style="display:none">
    <button class="sub-tab on" onclick="setSubTab('pros',this)">📋 Prosedyrer</button>
    <button class="sub-tab" onclick="setSubTab('logg',this)">📒 Loggbøker</button>
  </div>

  <!-- PT TABS – RG -->
  <div class="pt-tabs-bar" id="pt-tabs-bar" style="display:flex">
    <div class="slider-track" id="rg-slider-track">
      <div class="slider-thumb" id="rg-slider-thumb"></div>
      <button class="ptab on" onclick="setPt('voksen',this)">👤 Voksen</button>
      <button class="ptab ptab-barn" onclick="setPt('barn',this)">🧒 Barn</button>
      <button class="ptab" onclick="setPt('annet',this)">📁 Annet</button>
    </div>
  </div>

  <!-- PT TABS – CT protokoller -->
  <div class="pt-tabs-bar" id="prot-pt-tabs-bar" style="display:none">
    <div class="slider-track" id="ct-slider-track">
      <div class="slider-thumb" id="ct-slider-thumb"></div>
      <button class="ptab on" id="prot-ptab-voksen" onclick="setProtPt('voksen',this)">👤 Voksen</button>
      <button class="ptab ptab-barn" id="prot-ptab-barn" onclick="setProtPt('barn',this)">🧒 Barn</button>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-bar" id="search-bar">
    <div class="search-wrap">
      <svg class="sico" viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
      <input type="text" id="q" placeholder="Søk…" oninput="onSearch()">
    </div>
  </div>
</div>

<!-- CONTENT -->
<div style="display:flex;flex-direction:column;flex:1;overflow:hidden">

  <div class="panel-section active" id="section-pros">
    <div id="cat-grid-view" class="scroll-content">
      <div class="cat-grid" id="cat-grid"></div>
    </div>
    <div class="proc-view" id="proc-view">
      <div class="back-bar" id="pros-back-bar">

          <svg viewBox="0 0 16 16"><polyline points="10,4 6,8 10,12"/></svg>Tilbake
        </button>
        <span class="back-cat-name" id="back-cat-name"></span>
      </div>
      <div class="scroll-content"><div id="proc-list"></div></div>
    </div>
  </div>

  <div class="panel-section" id="section-logg-rg">
    <div class="scroll-content">
      <div class="logg-grid" id="logg-grid-rg"></div>
    </div>
  </div>

  <div class="panel-section" id="section-logg-other">
    <div class="coming-soon">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke-width="1.4" stroke-linecap="round"><rect x="8" y="6" width="32" height="36" rx="3"/><line x1="16" y1="18" x2="32" y2="18"/><line x1="16" y1="24" x2="32" y2="24"/><line x1="16" y1="30" x2="24" y2="30"/></svg>
      <h2>Loggbøker</h2>
      <p>Loggbøker for denne modaliteten legges inn senere.</p>
    </div>
  </div>

  <div class="panel-section" id="section-prot">
    <div id="prot-grid-view" class="scroll-content">
      <div class="cat-grid" id="prot-grid"></div>
    </div>
    <div class="proc-view" id="prot-proc-view">
      <div class="back-bar">
        <button class="back-btn" onclick="goBackProt()">
          <svg viewBox="0 0 16 16"><polyline points="10,4 6,8 10,12"/></svg>Tilbake
        </button>
        <span class="back-cat-name" id="prot-back-cat-name"></span>
      </div>
      <div class="scroll-content"><div id="prot-proc-list"></div></div>
    </div>
  </div>

  <div class="panel-section" id="section-soon">
    <div class="coming-soon">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke-width="1.4" stroke-linecap="round"><circle cx="24" cy="24" r="20"/><line x1="24" y1="15" x2="24" y2="25"/><circle cx="24" cy="32" r="1.5" fill="currentColor"/></svg>
      <h2 id="soon-title">Kommer snart</h2>
      <p id="soon-text">Innhold under utarbeidelse.</p>
    </div>
  </div>

</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const RG_CATS=[
  {id:'caput',label:'Caput',pt:'voksen',procs:[
    {name:'RG Caput / RG Orbita ved spørsmål om fremmedlegeme',url:'https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK17197.pdf'}
  ]},
  {id:'thorax-v',label:'Thorax / Abdomen',pt:'voksen',procs:[
    {name:'RG Thorax / Cor',url:'https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK14399.pdf'},
    {name:'RG Costa',url:'https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04179.pdf'},

  {id:'columna-v',label:'Columna',pt:'voksen',procs:[

    {name:'RG Thoracalcolumna',url:'https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04168.pdf'},
    {name:'RG Lumbosacralcolumna',url:'https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04169.pdf'},

    {name:'RG Scoliosemåling LAB 4 Moss',url:'https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK25941.pdf'},
    {name:'RG Scoliosemåling LAB 3 Moss',url:'https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK53606.pdf'}
  ]},
  {id:'bekken-v',label:'Bekken',pt:'voksen',procs:[
    {name:'RG Bekken',url:'https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04225.pdf'},
    {name:'RG Hofte',url:'https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04226.pdf'},

    {name:'RG Benlengdemåling LAB 4 Moss',url:'https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK20356.pdf'},

  ]},
  {id:'over-v',label:'Overekstremitet',pt:'voksen',procs:[
    {name:'RG Skulder',url:'https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04212.pdf'},
    {name:'RG Scapula',url:'https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04213.pdf'},
    {name:'RG Clavicula',url:'https://ek-sohf.sikt.sykehuspartner.no/docs/pub/DOK04214.pdf'},

// ── HELPERS ───────────────────────────────────────────────────────────────
const MOD_ORDER=['rg','ct','ul','gj','an'];

function showSection(id, dir='none'){
  document.querySelectorAll('.panel-section').forEach(s=>{
    s.classList.remove('active','slide-right','slide-left');
  });
  const el_=document.getElementById('section-'+id);
  if(!el_) return;
  el_.classList.add('active');
  if(dir==='right') el_.classList.add('slide-right');
  else if(dir==='left') el_.classList.add('slide-left');
}
function el(id){ return document.getElementById(id); }
function hide(id){ el(id).style.display='none'; }
function show(id,type='flex'){ el(id).style.display=type; }

function setHeaderState(ptBar, protPtBar, searchBar){
  el('pt-tabs-bar').style.display     = ptBar     ? 'flex' : 'none';
  el('prot-pt-tabs-bar').style.display= protPtBar ? 'flex' : 'none';
  el('search-bar').style.display      = searchBar ? 'block': 'none';
}

// ── MODALITET ─────────────────────────────────────────────────────────────
function setMod(mod, btn){
  const prevIdx=MOD_ORDER.indexOf(activeMod);
  const nextIdx=MOD_ORDER.indexOf(mod);
  const dir=nextIdx>prevIdx?'right':'left';
  activeMod=mod;
  document.querySelectorAll('.mod-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  moveModThumb(btn);
  ['rg','ct','other'].forEach(id=>hide('sub-tabs-'+id));
  el('q').value='';

  if(mod==='rg'){
    show('sub-tabs-rg','flex');
    resetSubTabs('rg',0);
    setHeaderState(true,false,true);
    activeCatId=null; activeProc=null; pt='voksen';
    resetPtTabs();
    renderCatGrid(); showCatView();
    showSection('pros', dir);
  } else if(mod==='ct'){
    show('sub-tabs-ct','flex');
    resetSubTabs('ct',0);
    setHeaderState(false,true,true);
    protPt='voksen';
    resetProtPtTabs();
    renderProtGrid();
    showSection('prot', dir);
  } else {
    show('sub-tabs-other','flex');
    resetSubTabs('other',0);
    setHeaderState(false,false,false);
    const labels={ul:'Ultralyd',gj:'Gjennomlysning',an:'Angiografi'};
    el('soon-title').textContent=labels[mod];
    el('soon-text').textContent=`Prosedyrer for ${labels[mod]} legges inn senere.`;
    showSection('soon', dir);
  }
}

function resetSubTabs(bar, activeIdx){
  const tabs=document.querySelectorAll('#sub-tabs-'+bar+' .sub-tab');
  tabs.forEach((t,i)=>{ t.classList.toggle('on', i===activeIdx); });
}
function moveModThumb(activeBtn){
  const track=document.getElementById('mod-slider-track');
  const thumb=document.getElementById('mod-slider-thumb');
  const btns=[...track.querySelectorAll('.mod-btn')];
  const idx=btns.indexOf(activeBtn);
  const pct=100/btns.length;
  thumb.style.left=`${idx*pct}%`;
  thumb.style.width=`${pct}%`;
}

function moveThumb(trackId, thumbId, activeBtn, barnColor){
  const track=document.getElementById(trackId);
  const thumb=document.getElementById(thumbId);
  const tabs=[...track.querySelectorAll('.ptab')];
  const idx=tabs.indexOf(activeBtn);
  const pct=100/tabs.length;
  thumb.style.left=`calc(${idx*pct}% + 0px)`;
  thumb.style.width=`${pct}%`;
  thumb.style.background=barnColor?'#c0507a':'var(--accent)';
}

function resetPtTabs(){
  const tabs=document.querySelectorAll('#rg-slider-track .ptab');
  tabs.forEach((b,i)=>b.classList.toggle('on',i===0));
  moveThumb('rg-slider-track','rg-slider-thumb',tabs[0],false);
}
function resetProtPtTabs(){
  const tabs=document.querySelectorAll('#ct-slider-track .ptab');
  tabs.forEach((b,i)=>b.classList.toggle('on',i===0));
  moveThumb('ct-slider-track','ct-slider-thumb',tabs[0],false);
}

// ── SUB TABS ──────────────────────────────────────────────────────────────
function setSubTab(tab, btn){
  const barId=['rg','ct','other'].find(id=>el('sub-tabs-'+id).style.display!=='none');
  if(barId) document.querySelectorAll('#sub-tabs-'+barId+' .sub-tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  el('q').value='';

  if(tab==='pros'){
    if(activeMod==='rg'){
      setHeaderState(true,false,true);
      activeCatId=null; activeProc=null;
      renderCatGrid(); showCatView();
      showSection('pros');
    } else if(activeMod==='ct'){
      setHeaderState(false,true,true);
      showSection('soon');
      el('soon-title').textContent='CT Prosedyrer';
      el('soon-text').textContent='Prosedyrer for CT legges inn senere.';
    } else {
      setHeaderState(false,false,false);
      showSection('soon');
    }
  } else if(tab==='logg'){
    setHeaderState(false,false,false);
    showSection(activeMod==='rg'?'logg-rg':'logg-other');
  } else if(tab==='prot'){
    setHeaderState(false,true,true);
    renderProtGrid();
    showSection('prot');
  }
}

// ── RG PT TABS ────────────────────────────────────────────────────────────
function setPt(val, btn){
  pt=val; activeCatId=null; activeProc=null;
  el('q').value='';
  document.querySelectorAll('#rg-slider-track .ptab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  moveThumb('rg-slider-track','rg-slider-thumb',btn,val==='barn');
  if(val==='annet'){
    const cat=RG_CATS.find(c=>c.id==='annet-div');
    if(cat){
      activeCatId=cat.id;
      el('back-cat-name').textContent='Annet';
      el('pros-back-bar').style.display='none';
      renderProcList(cat.procs,'');
      showProcView();
    }
  } else {
    el('pros-back-bar').style.display='flex';
    renderCatGrid(); showCatView();
  }
}

// ── CAT GRID ──────────────────────────────────────────────────────────────
function renderCatGrid(){
  const cats=RG_CATS.filter(c=>c.pt===pt);
  const barColor=pt==='barn'?'#c0507a':'var(--accent)';
  el('cat-grid').innerHTML=cats.map(c=>`
    <div class="cat-card" onclick="openCat('${c.id}')">
      <div class="cat-card-bar" style="background:${barColor}"></div>
      <div class="cat-card-label">${c.label}</div>
      <div class="cat-card-count">${c.procs.length} prosedyrer</div>
    </div>`).join('');
}

function openCat(id){
  activeCatId=id;
  const cat=RG_CATS.find(c=>c.id===id);
  if(!cat) return;
  el('back-cat-name').textContent=cat.label;
  el('pros-back-bar').style.display='flex';
  renderProcList(cat.procs,'');
  showProcView();
}

function showCatView(){
  el('cat-grid-view').style.display='block';
  el('proc-view').classList.remove('active');
}
function showProcView(){
  el('cat-grid-view').style.display='none';
  el('proc-view').classList.add('active');
}

function goBack(){
  if(pt==='annet') return;
  activeCatId=null; activeProc=null;
  el('q').value='';
  renderCatGrid(); showCatView();
}

function renderProcList(procs, q){
  el('proc-list').innerHTML=procs.length
    ? procs.map(p=>{
        const isAct=activeProc===p.name;
        const nm=p.name.replace(/'/g,"\\'");
        const ur=p.url||'null';
        return `<div class="prow${isAct?' active':''}" onclick="selectProc('${nm}','${ur}')">
          <span class="${p.url?'has-link':'no-link'}"></span>
          <span class="pname">${q?hl(p.name,q):p.name}</span>
        </div>`;
      }).join('')
    : `<div class="no-results">Ingen treff</div>`;
}

function selectProc(name, url){
  activeProc=name;
  if(url&&url!=='null') window.open(url,'_blank');
  if(activeCatId){
    const cat=RG_CATS.find(c=>c.id===activeCatId);
    if(cat){
      renderProcList(cat.procs,'');
      // Flash the active row
      setTimeout(()=>{
        const rows=document.querySelectorAll('#proc-list .prow');
        rows.forEach(r=>{
          if(r.querySelector('.pname')?.textContent===name){
            r.classList.add('flash');
            setTimeout(()=>r.classList.remove('flash'),700);
          }
        });
      },10);
    }
  }
}

// ── SEARCH ────────────────────────────────────────────────────────────────
function onSearch(){
  const q=el('q').value.trim();
  if(!q){
    if(activeMod==='rg'){ renderCatGrid(); showCatView(); }
    else { renderProtGrid(); }
    return;
  }
  let results=[];
  if(activeMod==='rg'){
    results=RG_CATS.flatMap(c=>c.procs).filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
    el('back-cat-name').textContent='Søkeresultater';
    el('pros-back-bar').style.display='flex';
    renderProcList(results, q);
    showProcView();
    showSection('pros');
  } else if(activeMod==='ct'){
    const all=[...CT_PROT.voksen,...CT_PROT.barn].flatMap(c=>c.procs);
    results=all.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
    el('prot-back-cat-name').textContent='Søkeresultater';
    el('prot-proc-list').innerHTML=results.length
      ? results.map(p=>`<div class="prow" onclick="window.open('${p.url}','_blank')"><span class="has-link"></span><span class="pname">${hl(p.name,q)}</span></div>`).join('')
      : `<div class="no-results">Ingen treff</div>`;
    el('prot-grid-view').style.display='none';
    el('prot-proc-view').classList.add('active');
    showSection('prot');
  }
}

function hl(t,q){
  const i=t.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return t;
  return t.slice(0,i)+`<mark style="background:var(--mark-bg);border-radius:2px;padding:0 1px">`+t.slice(i,i+q.length)+'</mark>'+t.slice(i+q.length);
}
