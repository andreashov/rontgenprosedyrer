<!DOCTYPE html>
<html lang="no" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bildediagnostikk – Sykehuset Østfold</title>
<link rel="icon" type="image/x-icon" href="https://andreashov.github.io/rontgenprosedyrer/favicon/favicon.ico">
<link rel="icon" type="image/svg+xml" href="https://andreashov.github.io/rontgenprosedyrer/favicon/favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="https://andreashov.github.io/rontgenprosedyrer/favicon/favicon-96x96.png">
<link rel="apple-touch-icon" sizes="180x180" href="https://andreashov.github.io/rontgenprosedyrer/favicon/apple-touch-icon.png">
<link rel="manifest" href="https://andreashov.github.io/rontgenprosedyrer/favicon/site.webmanifest">
<style>
:root{
  --bg:#f0f4f9;--surface:#fff;--surface2:#f7f9fc;--border:#dde3ec;
  --text:#0d1b2e;--text2:#4a5a72;--text3:#8a97aa;
  --accent:#1a4f8a;--accent-light:#dbeafe;--dot-empty:#c8d4e3;
  --mark-bg:#fef08a;--shadow:0 1px 4px rgba(0,0,0,.07);
  --glass-bg:rgba(255,255,255,0.55);
  --glass-border:rgba(255,255,255,0.75);
  --glass-shadow:0 8px 32px rgba(31,38,135,0.10);
  --glass-shine:rgba(255,255,255,0.6);
}
[data-theme="dark"]{
  --bg:#0c1520;--surface:#111e2e;--surface2:#162030;--border:#1e3045;
  --text:#e8edf5;--text2:#94a8c0;--text3:#4a6070;
  --accent:#4a9de0;--accent-light:#1a2d45;--dot-empty:#2a3d52;
  --mark-bg:#78530a;--shadow:0 1px 6px rgba(0,0,0,.3);
  --glass-bg:rgba(16,28,48,0.55);
  --glass-border:rgba(255,255,255,0.10);
  --glass-shadow:0 8px 32px rgba(0,0,0,0.35);
  --glass-shine:rgba(255,255,255,0.07);
}

/* LIQUID GLASS MIXIN */
.glass{
  background:var(--glass-bg);
  backdrop-filter:blur(20px) saturate(1.8);
  -webkit-backdrop-filter:blur(20px) saturate(1.8);
  border:1px solid var(--glass-border);
  box-shadow:var(--glass-shadow),inset 0 1px 0 var(--glass-shine),inset 0 -1px 0 rgba(0,0,0,.06);
  position:relative;
  overflow:hidden;
}
.glass::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:45%;
  background:linear-gradient(180deg,var(--glass-shine) 0%,transparent 100%);
  pointer-events:none;
  border-radius:inherit;
  z-index:0;
}
.glass>*{position:relative;z-index:1}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden;max-width:480px;margin:0 auto;width:100%;position:relative}
body::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;background:
  radial-gradient(ellipse at 20% 10%,rgba(91,179,232,0.35) 0%,transparent 55%),
  radial-gradient(ellipse at 80% 80%,rgba(26,79,138,0.25) 0%,transparent 55%),
  radial-gradient(ellipse at 60% 30%,rgba(100,160,255,0.15) 0%,transparent 40%),
  var(--bg)}
[data-theme="dark"] body::before{background:
  radial-gradient(ellipse at 20% 10%,rgba(74,157,224,0.20) 0%,transparent 55%),
  radial-gradient(ellipse at 80% 80%,rgba(26,79,138,0.20) 0%,transparent 55%),
  radial-gradient(ellipse at 60% 30%,rgba(30,60,100,0.25) 0%,transparent 40%),
  var(--bg)}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:8px;padding:0 12px;height:44px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.logo-wrap{display:flex;align-items:center;gap:7px}
.logo-text{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.04em;text-transform:uppercase}
.logo-sub{font-size:8px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.icon-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s;flex-shrink:0}
.icon-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.phone-btn{width:auto;padding:0 10px;gap:6px;font-size:11px;font-weight:600;color:var(--text2)}
.phone-btn span{white-space:nowrap}
.phone-btn svg{width:13px;height:13px;flex-shrink:0}

/* FIXED HEADER */
.fixed-header{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border)}

/* MODALITET BAR */
.modalitet-bar{display:flex;padding:8px 10px;border-bottom:1px solid var(--border);background:var(--surface);gap:6px}
.mod-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;border:none;background:transparent;cursor:pointer;transition:transform .15s;flex:1;min-width:0;overflow:visible;position:relative;padding:0;gap:0}
.mod-btn:active{transform:scale(.93)}
.mod-img-wrap{width:100%;border-radius:8px;overflow:hidden;aspect-ratio:4/3;position:relative;transition:box-shadow .2s,transform .2s}
.mod-img{width:100%;height:100%;object-fit:cover;display:block;opacity:.55;transition:opacity .2s}
.mod-btn.on .mod-img{opacity:1}
.mod-btn.on .mod-img-wrap{transform:translateY(-2px);box-shadow:0 4px 14px rgba(26,79,138,.45)}
.mod-indicator{height:3px;border-radius:2px;background:transparent;margin-top:4px;width:70%;transition:background .2s,width .2s cubic-bezier(.34,1.56,.64,1)}
.mod-btn.on .mod-indicator{background:var(--accent);width:100%}
.mod-label{display:none}

/* SUB TABS */
.sub-tabs{display:flex;padding:7px 10px;border-bottom:1px solid var(--border);background:var(--surface)}
.sub-slider-track{display:flex;flex:1;background:var(--surface2);border-radius:9px;padding:3px;position:relative;border:1px solid var(--border);overflow:hidden;min-width:0}
.sub-slider-thumb{position:absolute;top:3px;bottom:3px;border-radius:7px;background:var(--accent);transition:left .22s cubic-bezier(.34,1.56,.64,1),width .22s cubic-bezier(.34,1.56,.64,1);z-index:0;box-shadow:0 2px 6px rgba(0,0,0,.18);will-change:left,width}
.sub-tab{flex:1;padding:6px 4px;border-radius:7px;border:none;background:transparent;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;transition:color .2s;text-align:center;position:relative;z-index:1;white-space:nowrap;min-width:0}
.sub-tab:hover{color:var(--text2)}
.sub-tab.on{color:#fff}

/* PT TABS */
.pt-tabs-bar{display:flex;padding:7px 10px;border-bottom:1px solid var(--border);background:var(--surface)}
.slider-track{display:flex;flex:1;background:var(--surface2);border-radius:9px;padding:3px;position:relative;border:1px solid var(--border);overflow:hidden;min-width:0}
.slider-thumb{position:absolute;top:3px;bottom:3px;border-radius:7px;background:var(--accent);transition:left .22s cubic-bezier(.34,1.56,.64,1),width .22s cubic-bezier(.34,1.56,.64,1),background .2s;z-index:0;box-shadow:0 2px 6px rgba(0,0,0,.18);will-change:left,width}
.ptab{flex:1;padding:6px 0;border-radius:7px;border:none;background:transparent;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;transition:color .2s;text-align:center;position:relative;z-index:1}
.ptab:hover{color:var(--text2)}
.ptab.on{color:#fff}

/* SEARCH */
.search-bar{padding:7px 10px;border-bottom:1px solid var(--border);background:var(--surface)}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:7px 10px 7px 32px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface2);font-size:16px;color:var(--text);outline:none;height:34px}
.search-wrap input::placeholder{color:var(--text3);font-size:13px}
.search-wrap input:focus{border-color:var(--accent)}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--text3);fill:none;stroke-width:2;pointer-events:none}

/* SCROLL */
.scroll-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll-content::-webkit-scrollbar{width:3px}
.scroll-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* PANEL */
.panel-section{display:none;flex-direction:column;flex:1;overflow:hidden}
.panel-section.active{display:flex}

/* CAT GRID */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 10px;cursor:pointer;transition:background .15s,border-color .15s,transform .12s;display:flex;flex-direction:column;gap:4px;min-height:64px;position:relative;overflow:hidden}
.cat-card:hover{background:var(--accent-light);border-color:var(--accent)}
.cat-card:active{transform:scale(.96)}
.cat-card-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.cat-card-label{font-size:12px;font-weight:700;color:var(--text);line-height:1.3;margin-top:4px}
.cat-card-count{font-size:10px;color:var(--text3)}

/* PROC LIST */
.proc-view{display:none;flex-direction:column;flex:1;overflow:hidden}
.proc-view.active{display:flex}
.back-bar{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0}
.back-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface);font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;transition:background .15s,transform .1s}
.back-btn:active{transform:scale(.95)}
.back-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5}
.back-cat-name{font-size:12px;font-weight:700;color:var(--text);flex:1}
.prow{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border);min-height:44px}
.prow:hover{background:var(--surface2)}
.prow.active{background:var(--accent-light)}
.prow.flash{animation:rowFlash .5s ease forwards}
.pname{font-size:13px;color:var(--text2);flex:1;line-height:1.35}
.prow.active .pname{color:var(--accent);font-weight:600}
.has-link{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;opacity:.7}
.no-link{width:5px;height:5px;border-radius:50%;background:var(--dot-empty);flex-shrink:0}
.no-results{padding:2rem 10px;text-align:center;font-size:13px;color:var(--text3)}

/* LOGG */
.logg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px}
.lab-card{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:14px 10px;cursor:pointer;transition:background .15s,border-color .15s,transform .12s;display:flex;align-items:center;justify-content:center;text-align:center;min-height:52px}
.lab-card:hover{background:var(--accent-light);border-color:var(--accent)}
.lab-card:active{transform:scale(.97)}
.lab-card-name{font-size:13px;font-weight:700;color:var(--text)}

/* COMING SOON */
.coming-soon{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text3);padding:2rem;text-align:center}
.coming-soon svg{opacity:.35;stroke:var(--text3)}
.coming-soon h2{font-size:15px;font-weight:600;color:var(--text2)}
.coming-soon p{font-size:12px;line-height:1.6;max-width:260px}

/* ANIMATIONS */
@keyframes popIn{0%{transform:scale(.94);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{0%{transform:translateY(12px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes slideInRight{0%{transform:translateX(120px);opacity:0}100%{transform:translateX(0);opacity:1}}
@keyframes slideInLeft{0%{transform:translateX(-120px);opacity:0}100%{transform:translateX(0);opacity:1}}
@keyframes rowFlash{0%{background:var(--accent);transform:scaleX(1.01)}40%{background:var(--accent-light)}100%{background:transparent;transform:scaleX(1)}}
@keyframes drawerIn{0%{transform:translateX(100%)}100%{transform:translateX(0)}}

.panel-section.active{animation:fadeIn .2s ease}
.panel-section.slide-right{animation:slideInRight .28s cubic-bezier(.2,.8,.3,1) both}
.panel-section.slide-left{animation:slideInLeft .28s cubic-bezier(.2,.8,.3,1) both}
.prow{animation:slideUp .15s ease both}
.prow:nth-child(2){animation-delay:.03s}.prow:nth-child(3){animation-delay:.06s}
.prow:nth-child(4){animation-delay:.09s}.prow:nth-child(5){animation-delay:.12s}
.prow:nth-child(6){animation-delay:.15s}.prow:nth-child(7){animation-delay:.18s}
.prow:nth-child(8){animation-delay:.21s}.prow:nth-child(9){animation-delay:.24s}
.prow:nth-child(10){animation-delay:.27s}.prow:active{background:var(--accent-light)}
.ptab{transition:color .2s,transform .1s}.ptab:active{transform:scale(.95)}
.lab-card{transition:background .15s,border-color .15s,transform .12s}.lab-card:active{transform:scale(.97)}

/* CONTACT DRAWER */
.contact-overlay{position:fixed;inset:0;z-index:200;pointer-events:none}
.contact-overlay.open{pointer-events:all}
.contact-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.4);opacity:0;transition:opacity .25s;cursor:pointer}
.contact-overlay.open .contact-backdrop{opacity:1}
.contact-drawer{position:absolute;top:0;right:0;bottom:0;width:100%;max-width:480px;background:var(--surface);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.2,.8,.3,1);box-shadow:-4px 0 24px rgba(0,0,0,.2)}
.contact-overlay.open .contact-drawer{transform:translateX(0)}
.drawer-top{display:flex;align-items:center;gap:10px;padding:0 14px;height:50px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-title{font-size:14px;font-weight:700;color:var(--text);flex:1}
.drawer-close{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.drawer-close svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.contact-search{padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.contact-search input{width:100%;padding:7px 10px 7px 32px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface2);font-size:16px;color:var(--text);outline:none;height:34px}
.contact-search input:focus{border-color:var(--accent)}
.contact-search .sico{left:22px}

/* TWO COLUMN LAYOUT */
.contact-cols{display:flex;flex:1;overflow:hidden;gap:0}
.contact-col{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.contact-col:last-child{border-right:none}
.col-header{padding:7px 10px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:6px}
.col-header-bar{width:3px;height:14px;border-radius:2px;flex-shrink:0}
.col-header-label{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.04em;text-transform:uppercase}
.contact-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.contact-scroll::-webkit-scrollbar{width:3px}
.contact-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.contact-group{border-bottom:1px solid var(--border)}
.contact-group-header{display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--surface2);cursor:pointer;user-select:none;position:sticky;top:0;z-index:1}
.contact-group-bar{width:3px;height:12px;border-radius:2px;background:var(--accent);flex-shrink:0}
.contact-group-label{font-size:10px;font-weight:700;color:var(--text);flex:1;letter-spacing:.03em;text-transform:uppercase;line-height:1.2}
.contact-group-arr{width:11px;height:11px;stroke:var(--text3);fill:none;stroke-width:2.5;transition:transform .15s;flex-shrink:0}
.contact-group-arr.open{transform:rotate(90deg)}
.contact-rows{overflow:hidden;transition:max-height .2s ease}
.contact-row{display:flex;flex-direction:column;gap:3px;padding:8px 10px;border-top:1px solid var(--border)}
.contact-name{font-size:11.5px;font-weight:600;color:var(--text);line-height:1.3}
.contact-role{font-size:10px;color:var(--text3);line-height:1.3}
.contact-num-row{display:flex;align-items:center;justify-content:space-between;gap:4px}
.contact-num-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.contact-num{font-size:12px;font-weight:700;color:var(--accent);text-decoration:none;white-space:nowrap}
.contact-num:hover{text-decoration:underline}
.no-contact-results{padding:2rem 10px;text-align:center;font-size:12px;color:var(--text3)}

@media(max-width:640px){
  body{height:auto;min-height:100vh;overflow:auto;max-width:100%}
  .panel-section.active{min-height:200px}
}
</style>
</head>
<body>

<!-- CONTACT DRAWER -->
<div class="contact-overlay" id="contact-overlay">
  <div class="contact-backdrop" onclick="closeContacts()"></div>
  <div class="contact-drawer">
    <div class="drawer-top">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8a19.79 19.79 0 01-3.07-8.67A2 2 0 012 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14z"/></svg>
      <span class="drawer-title">Telefoni</span>
      <button class="drawer-close" onclick="closeContacts()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="contact-search">
      <div class="search-wrap">
        <svg class="sico" viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
    <input type="text" id="contact-q" placeholder="  Søk navn eller nummer…" oninput="searchContacts()">
      </div>
    </div>
    <div class="contact-cols">
      <div class="contact-col">
        <div class="col-header">
          <div class="col-header-bar" style="background:#1a4f8a"></div>
          <span class="col-header-label">Intern avdeling</span>
        </div>
        <div class="contact-scroll" id="contact-scroll-intern"></div>
      </div>
      <div class="contact-col">
        <div class="col-header">
          <div class="col-header-bar" style="background:#5a4f8a"></div>
          <span class="col-header-label">Sykehuset øvrig</span>
        </div>
        <div class="contact-scroll" id="contact-scroll-other"></div>
      </div>
    </div>
  </div>
</div>

<div class="topbar">
  <div class="logo-wrap">
    <svg width="26" height="26" viewBox="0 0 34 34" fill="none">
      <circle cx="8" cy="8" r="5.5" fill="#5bb3e8"/>
      <circle cx="22" cy="8" r="4.5" fill="#5bb3e8" opacity=".6"/>
      <circle cx="8" cy="22" r="4.5" fill="#1a4f8a"/>
      <circle cx="22" cy="22" r="3.5" fill="#1a4f8a" opacity=".7"/>
    </svg>
    <div>
      <div class="logo-text">Sykehuset Østfold</div>
      <div class="logo-sub">Bildediagnostikk</div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="icon-btn phone-btn" onclick="openContacts()" title="Telefoni">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8a19.79 19.79 0 01-3.07-8.67A2 2 0 012 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14z"/></svg>
      <span>Telefoni</span>
    </button>
    <button class="icon-btn" onclick="toggleTheme()" title="Bytt tema">
      <svg id="theme-ico" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
  </div>
</div>

<div class="fixed-header">
  <div class="modalitet-bar">
    <button class="mod-btn on" onclick="setMod('rg',this)">
      <div class="mod-img-wrap"><img class="mod-img" src="https://andreashov.github.io/rontgenprosedyrer/modalitet-symbol/røntgen.png" onerror="this.style.display='none'" alt=""></div>
      <div class="mod-indicator"></div>
    </button>
    <button class="mod-btn" onclick="setMod('ct',this)">
      <div class="mod-img-wrap"><img class="mod-img" src="https://andreashov.github.io/rontgenprosedyrer/modalitet-symbol/ct.png" onerror="this.style.display='none'" alt=""></div>
      <div class="mod-indicator"></div>

function openContacts(){
  document.getElementById('contact-overlay').classList.add('open');
  document.getElementById('contact-q').value='';
  renderContacts('');
}
function closeContacts(){
  document.getElementById('contact-overlay').classList.remove('open');
}
function searchContacts(){
  renderContacts(document.getElementById('contact-q').value.trim());
}

function telLink(n){ return 'tel:+47'+n.replace(/\s/g,''); }

function contactRowHtml(e){
  return `<div class="contact-row">
    <div class="contact-info">
      <div class="contact-name">${e.name}</div>
      ${e.role?`<div class="contact-role">${e.role}</div>`:''}
    </div>
    <div class="contact-nums-inline">
      ${e.nums.map(n=>`
        <div class="contact-num-row">
          ${n.label?`<span class="contact-num-label">${n.label}</span>`:''}
          <a class="contact-num" href="${telLink(n.num)}">${n.num}</a>
        </div>`).join('')}
    </div>
  </div>`;
}

function groupHtml(g, openMap, prefix){
  const key=prefix+g.group;
  const isOpen=openMap[g.group]||false;
  return `<div class="contact-group">
    <div class="contact-group-header" onclick="toggleGroup('${g.group.replace(/'/g,"\\'")}','${prefix}')">
      <div class="contact-group-bar" style="background:${g.color}"></div>
      <span class="contact-group-label">${g.group}</span>
      <svg class="contact-group-arr${isOpen?' open':''}" viewBox="0 0 16 16"><polyline points="6,4 10,8 6,12"/></svg>
    </div>
    <div class="contact-rows" style="max-height:${isOpen?'9999px':'0'};overflow:hidden;transition:max-height .2s ease">
      ${g.entries.map(e=>contactRowHtml(e)).join('')}
    </div>
  </div>`;
}

function renderContacts(q){
  if(q){
    const ql=q.toLowerCase().replace(/\s/g,'');
    const filterEntries=(groups)=>groups.flatMap(g=>
      g.entries.filter(e=>
        e.name.toLowerCase().includes(q.toLowerCase())||
        e.role.toLowerCase().includes(q.toLowerCase())||
        e.nums.some(n=>n.num.replace(/\s/g,'').includes(ql))
      ).map(e=>contactRowHtml(e))
    ).join('');
    const internHtml=filterEntries(INTERN_GROUPS);
    const otherHtml=filterEntries(OTHER_GROUPS);
    document.getElementById('contact-scroll-intern').innerHTML=internHtml||`<div class="no-contact-results">Ingen treff</div>`;
    document.getElementById('contact-scroll-other').innerHTML=otherHtml||`<div class="no-contact-results">Ingen treff</div>`;
    return;
  }
  document.getElementById('contact-scroll-intern').innerHTML=INTERN_GROUPS.map(g=>groupHtml(g,openGroupsIntern,'intern-')).join('');
  document.getElementById('contact-scroll-other').innerHTML=OTHER_GROUPS.map(g=>groupHtml(g,openGroupsOther,'other-')).join('');
}

function toggleGroup(group, prefix){
  const map=prefix==='intern-'?openGroupsIntern:openGroupsOther;
  map[group]=!map[group];
  const isOpen=map[group];
  const scrollId=prefix==='intern-'?'contact-scroll-intern':'contact-scroll-other';
  const scroll=document.getElementById(scrollId);
  const headers=[...scroll.querySelectorAll('.contact-group-header')];
  headers.forEach(h=>{
    const lbl=h.querySelector('.contact-group-label')?.textContent;
    if(lbl===group){
      h.querySelector('.contact-group-arr')?.classList.toggle('open',isOpen);
      const rows=h.nextElementSibling;
      if(rows) rows.style.maxHeight=isOpen?'9999px':'0';
    }
  });
}

function showSection(id, dir='none'){
  document.querySelectorAll('.panel-section').forEach(s=>s.classList.remove('active','slide-right','slide-left'));
  const s=document.getElementById('section-'+id);
  if(!s) return;
  s.classList.add('active');
  if(dir==='right') s.classList.add('slide-right');
  else if(dir==='left') s.classList.add('slide-left');
}
function el(id){ return document.getElementById(id); }

function setHeaderState(ptBar, protPtBar, searchBar){
  el('pt-tabs-bar').style.display     = ptBar     ?'flex':'none';
  el('prot-pt-tabs-bar').style.display= protPtBar ?'flex':'none';
  el('search-bar').style.display      = searchBar ?'block':'none';
}

// ── SLIDER HELPERS ────────────────────────────────────────────────────────
function moveThumb(trackId, thumbId, activeBtn, barnColor){
  const track=document.getElementById(trackId);
  const thumb=document.getElementById(thumbId);
  if(!track||!thumb) return;
  const tabs=[...track.querySelectorAll('.ptab')];
  const idx=tabs.indexOf(activeBtn);
  const pct=100/tabs.length;
  thumb.style.left=`${idx*pct}%`;
  thumb.style.width=`${pct}%`;
  thumb.style.background=barnColor?'#c0507a':'var(--accent)';
}
function moveSubThumb(trackId, thumbId, activeBtn){
  const track=document.getElementById(trackId);
  const thumb=document.getElementById(thumbId);
  if(!track||!thumb) return;
  const tabs=[...track.querySelectorAll('.sub-tab')];
  const idx=tabs.indexOf(activeBtn);
  const pct=100/tabs.length;
  thumb.style.left=`${idx*pct}%`;
  thumb.style.width=`${pct}%`;
}
function resetSubTabs(bar, activeIdx){
  const track=document.getElementById('sub-track-'+bar);
  const tabs=[...track.querySelectorAll('.sub-tab')];
  tabs.forEach((t,i)=>t.classList.toggle('on',i===activeIdx));
  moveSubThumb('sub-track-'+bar,'sub-thumb-'+bar,tabs[activeIdx]);
}
function resetPtTabs(){
  const tabs=document.querySelectorAll('#rg-slider-track .ptab');
  tabs.forEach((b,i)=>b.classList.toggle('on',i===0));
  moveThumb('rg-slider-track','rg-slider-thumb',tabs[0],false);
}
function resetProtPtTabs(){
  const tabs=document.querySelectorAll('#ct-slider-track .ptab');
  tabs.forEach((b,i)=>b.classList.toggle('on',i===0));
  moveThumb('ct-slider-track','ct-slider-thumb',tabs[0],false);
}

// ── MODALITET ─────────────────────────────────────────────────────────────
function setMod(mod, btn){
  const prevIdx=MOD_ORDER.indexOf(activeMod);
  const nextIdx=MOD_ORDER.indexOf(mod);
  const dir=nextIdx>prevIdx?'right':'left';
  activeMod=mod;
  document.querySelectorAll('.mod-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  ['rg','ct','other'].forEach(id=>el('sub-tabs-'+id).style.display='none');
  el('q').value='';

  if(mod==='rg'){
    el('sub-tabs-rg').style.display='flex';
    resetSubTabs('rg',0);
    setHeaderState(true,false,true);
    activeCatId=null; activeProc=null; pt='voksen';
    resetPtTabs();
    renderCatGrid(); showCatView();
    showSection('pros',dir);
  } else if(mod==='ct'){
    el('sub-tabs-ct').style.display='flex';
    resetSubTabs('ct',0);
    setHeaderState(false,true,true);
    protPt='voksen';
    resetProtPtTabs();
    renderProtGrid();
    showSection('prot',dir);
  } else {
    el('sub-tabs-other').style.display='flex';
    resetSubTabs('other',0);
    setHeaderState(false,false,false);
    const labels={ul:'Ultralyd',gj:'Gjennomlysning',an:'Angiografi'};
    el('soon-title').textContent=labels[mod];
    el('soon-text').textContent=`Prosedyrer for ${labels[mod]} legges inn senere.`;
    showSection('soon',dir);
  }
}

// ── SUB TABS ──────────────────────────────────────────────────────────────
function setSubTab(tab, btn, trackId, thumbId){
  const track=document.getElementById(trackId);
  if(track){ track.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('on')); btn.classList.add('on'); moveSubThumb(trackId,thumbId,btn); }
  el('q').value='';
  if(tab==='pros'){
    if(activeMod==='rg'){ setHeaderState(true,false,true); activeCatId=null; activeProc=null; renderCatGrid(); showCatView(); showSection('pros'); }
    else if(activeMod==='ct'){ setHeaderState(false,true,true); el('soon-title').textContent='CT Prosedyrer'; el('soon-text').textContent='Prosedyrer for CT legges inn senere.'; showSection('soon'); }
    else { setHeaderState(false,false,false); showSection('soon'); }
  } else if(tab==='logg'){
    setHeaderState(false,false,false);
    showSection(activeMod==='rg'?'logg-rg':'logg-other');
  } else if(tab==='prot'){
    setHeaderState(false,true,true);
    renderProtGrid(); showSection('prot');
  }
}

  if(!cat) return;
  el('back-cat-name').textContent=cat.label;
  el('pros-back-bar').style.display='flex';
  renderProcList(cat.procs,''); showProcView();
}
function showCatView(){ el('cat-grid-view').style.display='block'; el('proc-view').classList.remove('active'); }
function showProcView(){ el('cat-grid-view').style.display='none'; el('proc-view').classList.add('active'); }
function goBack(){
  if(pt==='annet') return;
  activeCatId=null; activeProc=null; el('q').value='';
  renderCatGrid(); showCatView();
}
function renderProcList(procs, q){
  el('proc-list').innerHTML=procs.length
    ? procs.map(p=>{
        const isAct=activeProc===p.name;
        const nm=p.name.replace(/'/g,"\\'"); const ur=p.url||'null';
        return `<div class="prow${isAct?' active':''}" onclick="selectProc('${nm}','${ur}')">
          <span class="${p.url?'has-link':'no-link'}"></span>
          <span class="pname">${q?hl(p.name,q):p.name}</span></div>`;
      }).join('')
    : `<div class="no-results">Ingen treff</div>`;
}
function selectProc(name, url){
  activeProc=name;
  if(url&&url!=='null') window.open(url,'_blank');
  if(activeCatId){
    const cat=RG_CATS.find(c=>c.id===activeCatId);
    if(cat){
      renderProcList(cat.procs,'');
      setTimeout(()=>{
        document.querySelectorAll('#proc-list .prow').forEach(r=>{
          if(r.querySelector('.pname')?.textContent===name){ r.classList.add('flash'); setTimeout(()=>r.classList.remove('flash'),700); }
        });
      },10);
    }
  }
}

// ── SEARCH ────────────────────────────────────────────────────────────────
function onSearch(){
  const q=el('q').value.trim();
  if(!q){
    if(activeMod==='rg'){ renderCatGrid(); showCatView(); }
    else renderProtGrid();
    return;
  }
  if(activeMod==='rg'){
    const results=RG_CATS.flatMap(c=>c.procs).filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
    el('back-cat-name').textContent='Søkeresultater'; el('pros-back-bar').style.display='flex';
    renderProcList(results,q); showProcView(); showSection('pros');
  } else if(activeMod==='ct'){
    const all=[...CT_PROT.voksen,...CT_PROT.barn].flatMap(c=>c.procs);
    const results=all.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
    el('prot-back-cat-name').textContent='Søkeresultater';
    el('prot-proc-list').innerHTML=results.length
      ? results.map(p=>`<div class="prow" onclick="window.open('${p.url}','_blank')"><span class="has-link"></span><span class="pname">${hl(p.name,q)}</span></div>`).join('')
      : `<div class="no-results">Ingen treff</div>`;
    el('prot-grid-view').style.display='none'; el('prot-proc-view').classList.add('active'); showSection('prot');
  }
}
function hl(t,q){
  const i=t.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return t;
  return t.slice(0,i)+`<mark style="background:var(--mark-bg);border-radius:2px;padding:0 1px">`+t.slice(i,i+q.length)+'</mark>'+t.slice(i+q.length);
}

// ── CT PROTOKOLLER ────────────────────────────────────────────────────────
function renderProtGrid(){
  const cats=CT_PROT[protPt];
  const barColor=protPt==='barn'?'#c0507a':'var(--accent)';
  el('prot-grid').innerHTML=cats.map(c=>`
    <div class="cat-card" onclick="openProt('${c.id}')">
      <div class="cat-card-bar" style="background:${barColor}"></div>
      <div class="cat-card-label">${c.label}</div>
      <div class="cat-card-count">${c.procs.length>0?c.procs.length+' protokoller':'Legges inn senere'}</div>
    </div>`).join('');
  el('prot-grid-view').style.display='block'; el('prot-proc-view').classList.remove('active');
}
function openProt(id){
  activeProtId=id;
  const cat=[...CT_PROT.voksen,...CT_PROT.barn].find(c=>c.id===id);
  if(!cat) return;
  el('prot-back-cat-name').textContent=cat.label;
  el('prot-proc-list').innerHTML=cat.procs.length
    ? cat.procs.map(p=>`<div class="prow" onclick="window.open('${p.url}','_blank')"><span class="has-link"></span><span class="pname">${p.name}</span></div>`).join('')
    : `<div class="no-results">Protokoller for ${cat.label} legges inn senere.</div>`;
  el('prot-grid-view').style.display='none'; el('prot-proc-view').classList.add('active');
}
function goBackProt(){ activeProtId=null; renderProtGrid(); }

// ── LOGG ──────────────────────────────────────────────────────────────────
el('logg-grid-rg').innerHTML=RG_LABS.map(l=>`
  <div class="lab-card" onclick="window.open('${l.url}','_blank')">
    <div class="lab-card-name">${l.name}</div>
  </div>`).join('');

// ── INIT ──────────────────────────────────────────────────────────────────
setHeaderState(true,false,true);
renderCatGrid();
setTimeout(()=>{
  const rgTabs=document.querySelectorAll('#rg-slider-track .ptab');
  moveThumb('rg-slider-track','rg-slider-thumb',rgTabs[0],false);
  const ctTabs=document.querySelectorAll('#ct-slider-track .ptab');
  moveThumb('ct-slider-track','ct-slider-thumb',ctTabs[0],false);
  ['rg','ct','other'].forEach(bar=>{
    const track=document.getElementById('sub-track-'+bar);
    if(track){ const first=track.querySelector('.sub-tab.on')||track.querySelector('.sub-tab'); if(first) moveSubThumb('sub-track-'+bar,'sub-thumb-'+bar,first); }
  });
},0);
</script>
</body>
