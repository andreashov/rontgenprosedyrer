<!DOCTYPE html>
<html lang="no" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bildediagnostikk – Sykehuset Østfold</title>
<style>
:root{
  --bg:#f0f4f9;--surface:#fff;--surface2:#f7f9fc;--border:#dde3ec;
  --text:#0d1b2e;--text2:#4a5a72;--text3:#8a97aa;
  --accent:#1a4f8a;--accent-light:#dbeafe;--dot-empty:#c8d4e3;
  --mark-bg:#fef08a;--shadow:0 1px 4px rgba(0,0,0,.07);
  --shadow-md:0 4px 16px rgba(0,0,0,.10);
}
[data-theme="dark"]{
  --bg:#0c1520;--surface:#111e2e;--surface2:#162030;--border:#1e3045;
  --text:#e8edf5;--text2:#94a8c0;--text3:#4a6070;
  --accent:#4a9de0;--accent-light:#1a2d45;--dot-empty:#2a3d52;
  --mark-bg:#78530a;--shadow:0 1px 6px rgba(0,0,0,.3);
  --shadow-md:0 4px 20px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:12px;padding:0 14px;height:50px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;box-shadow:var(--shadow)}
.logo-wrap{display:flex;align-items:center;gap:8px}
.logo-text{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.04em;text-transform:uppercase}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.theme-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s;flex-shrink:0}
.theme-btn:hover{background:var(--accent-light);border-color:var(--accent)}
.theme-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

/* MODALITET BAR */
.modalitet-bar{display:flex;gap:6px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.mod-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px 6px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .15s;flex:1;min-width:0;height:72px}
.mod-btn:hover{border-color:var(--accent);background:var(--accent-light)}
.mod-btn.on{background:var(--accent);border-color:var(--accent);box-shadow:0 2px 8px rgba(26,79,138,.3)}
.mod-icon{width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.mod-icon svg{width:100%;height:100%}
.mod-btn svg{stroke:var(--text2);transition:stroke .15s}
.mod-btn.on svg{stroke:#fff}
.mod-label{font-size:10px;font-weight:600;color:var(--text2);letter-spacing:.02em;white-space:nowrap;text-align:center;transition:color .15s}
.mod-btn.on .mod-label{color:#fff}
.mod-soon{font-size:8px;font-weight:600;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;background:var(--bg);border-radius:4px;padding:1px 4px;transition:all .15s}
.mod-btn.on .mod-soon{background:rgba(255,255,255,.2);color:rgba(255,255,255,.8)}

/* MAIN LAYOUT */
.main{display:flex;flex:1;overflow:hidden}
.tab-panel{display:none;flex:1;overflow:hidden}
.tab-panel.on{display:flex}

/* LEFT PANEL (nav + tabs) */
.left-panel{width:300px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}

/* DESKTOP TABS inside left panel */
.left-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0}
.left-tab{flex:1;padding:11px 8px;font-size:12px;font-weight:600;color:var(--text3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;text-align:center}
.left-tab.on{color:var(--accent);border-bottom-color:var(--accent);background:var(--surface)}
.left-tab:hover:not(.on){color:var(--text2)}

/* NAV */
.nav-top{padding:12px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface2)}
.ptabs{display:flex;gap:6px;margin-bottom:12px}
.ptab{flex:1;padding:11px 0;border-radius:9px;border:2px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .15s;text-align:center}
.ptab:hover{border-color:var(--accent);color:var(--accent)}
.ptab.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(26,79,138,.3)}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:11px 12px 11px 36px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);font-size:16px;color:var(--text);outline:none;transition:border-color .15s}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap input:focus{border-color:var(--accent)}
.sico{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text3);fill:none;stroke-width:2;pointer-events:none}
.nav-body{flex:1;overflow-y:auto;padding:8px 6px 16px}
.nav-body::-webkit-scrollbar{width:3px}
.nav-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.pt-divider{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:12px 6px 4px;display:flex;align-items:center;gap:6px}
.pt-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.cat-row{display:flex;align-items:center;gap:8px;padding:11px 10px;border-radius:10px;cursor:pointer;user-select:none;transition:background .12s;margin-bottom:2px;color:var(--text);min-height:44px}
.cat-row:hover{background:var(--surface2)}
.cat-row.open{background:var(--accent-light)}
.cat-bar{width:3px;height:18px;border-radius:2px;flex-shrink:0}
.cat-label{font-size:13px;font-weight:600;flex:1;line-height:1.2}
.cat-count{font-size:10px;color:var(--text3);background:var(--bg);padding:2px 6px;border-radius:10px;border:1px solid var(--border)}
.cat-arr{width:13px;height:13px;stroke:var(--text3);fill:none;stroke-width:2.5;transition:transform .15s;flex-shrink:0}
.cat-arr.open{transform:rotate(90deg)}
.proc-rows{overflow:hidden;transition:max-height .2s ease}
.prow{display:flex;align-items:center;gap:8px;padding:9px 10px 9px 22px;border-radius:8px;cursor:pointer;transition:background .1s;margin-bottom:2px;min-height:44px}
.prow:hover{background:var(--surface2)}
.prow.active{background:var(--accent-light);border-left:2px solid var(--accent)}
.pname{font-size:13px;color:var(--text2);flex:1;line-height:1.35}
.prow.active .pname{color:var(--accent);font-weight:600}
.has-link{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;opacity:.7}
.no-link{width:5px;height:5px;border-radius:50%;background:var(--dot-empty);flex-shrink:0}
.no-results{padding:2rem 8px;text-align:center;font-size:13px;color:var(--text3)}

/* VIEWER */
.viewer{flex:1;display:flex;flex-direction:column;min-width:0}
.viewer-top{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;min-height:52px}
.viewer-title{font-size:13px;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.viewer-title.empty{color:var(--text3);font-weight:400}
.viewer-body{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.empty-state{display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--text3);padding:2rem}
.empty-state svg{opacity:.4;stroke:var(--text3)}
.empty-state p{font-size:13px;text-align:center;line-height:1.6;color:var(--text3)}

/* COMING SOON */
.coming-soon{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--text3);padding:2rem;text-align:center}
.coming-soon .cs-icon svg{width:56px;height:56px;stroke:var(--text3);opacity:.4;fill:none;stroke-width:1.4}
.coming-soon h2{font-size:16px;font-weight:600;color:var(--text2)}
.coming-soon p{font-size:13px;line-height:1.6;max-width:280px}

/* LOGGBØKER */
.logg-panel{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.labs-section{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.section-header{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--surface2)}
.section-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.section-title svg{stroke:var(--accent);fill:none;stroke-width:2;width:16px;height:16px}
.lab-list{display:flex;flex-direction:column;gap:0}
.lab-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border)}
.lab-item:last-child{border-bottom:none}
.lab-item:hover{background:var(--surface2)}
.lab-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lab-dot.fixed{background:#1a4f8a}
.lab-dot.mobile-lab{background:#0f6e56}
.lab-item-name{font-size:13px;font-weight:600;color:var(--text);flex:1}
.lab-item-type{font-size:11px;color:var(--text3)}
.lab-item-arr{width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:2;flex-shrink:0}

/* MOBILE TABBAR (hidden on desktop) */
.mobile-tabbar{display:none;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;padding:0 14px}
.tabbtn{padding:11px 18px;font-size:13px;font-weight:600;color:var(--text3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tabbtn.on{color:var(--accent);border-bottom-color:var(--accent)}

/* RESPONSIVE */
@media(max-width:900px){.left-panel{width:240px}}

@media(max-width:640px){
  body{overflow:auto;height:auto;min-height:100vh}
  .main{flex-direction:column;overflow:visible}
  .tab-panel.on{flex-direction:column}
  .left-panel{width:100%;border-right:none;border-bottom:1px solid var(--border)}
  .left-tabs{display:none}
  .mobile-tabbar{display:flex}
  .viewer{display:none}
  .viewer-top{display:none}
  .logg-panel{padding:12px;gap:10px}
  .logo-text{font-size:12px}
  .tabbtn{padding:9px 12px;font-size:12px}
  .mod-btn{height:64px}
  .mod-icon{width:24px;height:24px}
  .mod-label{font-size:9px}
}
@media(max-width:400px){
  .ptab{font-size:11px;padding:9px 0}
  .cat-label{font-size:12px}
  .pname{font-size:12px}
  .tabbtn{padding:8px 8px;font-size:11px}
  .mod-btn{height:58px}
  .mod-icon{width:20px;height:20px}
  .mod-label{font-size:8px}
}

/* COMPACT */
body.compact{overflow:auto;height:auto;min-height:100vh;width:100%;max-width:480px;margin:0 auto}
body.compact .main{flex-direction:column;overflow:visible}
body.compact .tab-panel.on{flex-direction:column}
body.compact .left-panel{width:100%;border-right:none;border-bottom:1px solid var(--border)}
body.compact .left-tabs{display:none}
body.compact .mobile-tabbar{display:flex}
body.compact .viewer{display:none}
body.compact .logg-panel{padding:10px}
body.compact .tabbtn{padding:9px 12px;font-size:12px}
body.compact .mod-btn{height:64px}
body.compact .mod-icon{width:24px;height:24px}
body.compact .mod-label{font-size:9px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-wrap">
    <svg width="30" height="30" viewBox="0 0 34 34" fill="none">
      <circle cx="8" cy="8" r="5.5" fill="#5bb3e8"/>
      <circle cx="22" cy="8" r="4.5" fill="#5bb3e8" opacity=".6"/>
      <circle cx="8" cy="22" r="4.5" fill="#1a4f8a"/>
      <circle cx="22" cy="22" r="3.5" fill="#1a4f8a" opacity=".7"/>
    </svg>
    <div>
      <div class="logo-text">Sykehuset Østfold</div>
      <div class="logo-sub">Bildediagnostikk</div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="theme-btn" onclick="toggleTheme()">
      <svg id="theme-ico" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
  </div>
</div>

<!-- MODALITET BAR -->
<div class="modalitet-bar">
  <!-- Røntgen: håndröntgen -->
  <button class="mod-btn on" onclick="setMod('rg',this)" title="Røntgen">
    <span class="mod-icon">
      <svg viewBox="0 0 28 28" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <!-- Palm -->
        <path d="M10 22 Q9 26 14 26 Q19 26 18 22"/>
        <!-- Thumb -->
        <path d="M9 18 Q6 16 6 13 Q6 11 8 11 Q9 11 9 13"/>
        <!-- Index -->
        <path d="M10 18 L10 8 Q10 6 12 6 Q14 6 14 8 L14 18"/>
        <!-- Middle -->
        <path d="M14 18 L14 7 Q14 5 16 5 Q18 5 18 7 L18 18"/>
        <!-- Ring -->
        <path d="M18 18 L18 8 Q18 6 19.5 6 Q21 6 21 8 L21 18"/>
        <!-- Pinky -->
        <path d="M21 18 L21 10 Q21 9 22 9 Q23 9 23 10 L23 18"/>
        <!-- Palm base -->
        <path d="M9 18 Q9 22 14 22 Q19 22 21 18"/>
        <!-- Bone lines -->
        <line x1="12" y1="10" x2="12" y2="21" stroke-width=".8" opacity=".5"/>
        <line x1="16" y1="9" x2="16" y2="21" stroke-width=".8" opacity=".5"/>
        <line x1="19.5" y1="10" x2="19.5" y2="21" stroke-width=".8" opacity=".5"/>
      </svg>
    </span>
    <span class="mod-label">Røntgen</span>
  </button>

  <!-- CT: CT-maskin -->
  <button class="mod-btn" onclick="setMod('ct',this)" title="CT">
    <span class="mod-icon">
      <svg viewBox="0 0 28 28" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="24" height="16" rx="3"/>
        <circle cx="14" cy="15" r="5.5"/>
        <circle cx="14" cy="15" r="2.5"/>
        <rect x="8" y="21" width="12" height="3" rx="1"/>
        <rect x="10" y="24" width="8" height="2" rx="1"/>
        <rect x="4" y="10" width="3" height="2" rx=".5" opacity=".6"/>
      </svg>
    </span>
    <span class="mod-label">CT</span>
    <span class="mod-soon">Kommer</span>
  </button>

  <!-- Ultralyd: probe -->
  <button class="mod-btn" onclick="setMod('ul',this)" title="Ultralyd">
    <span class="mod-icon">
      <svg viewBox="0 0 28 28" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <!-- Probe body -->
        <path d="M10 20 L9 25 Q9 27 11 27 L17 27 Q19 27 19 25 L18 20 Z"/>
        <!-- Probe head (trapezoid) -->
        <path d="M8 12 Q8 8 14 8 Q20 8 20 12 L18 20 L10 20 Z"/>
        <!-- Cable -->
        <path d="M14 27 Q14 28 13 28" stroke-width="1.2"/>
        <!-- Sound waves -->
        <path d="M4 7 Q6 4 8 7" stroke-width="1.3"/>
        <path d="M2 5 Q5 1 8 5" stroke-width="1.1"/>
        <!-- Indicator line on probe -->
        <line x1="13" y1="13" x2="15" y2="13" stroke-width="1.2" opacity=".7"/>
      </svg>
    </span>
    <span class="mod-label">Ultralyd</span>
    <span class="mod-soon">Kommer</span>
  </button>

  <!-- Gjennomlysning: håndholdt lommelykt -->
  <button class="mod-btn" onclick="setMod('gj',this)" title="Gjennomlysning">
    <span class="mod-icon">
      <svg viewBox="0 0 28 28" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <!-- Torch body (handle) -->
        <rect x="11" y="16" width="6" height="9" rx="2"/>
        <!-- Torch head (wider) -->
        <path d="M9 9 L10 16 L18 16 L19 9 Q19 7 14 7 Q9 7 9 9Z"/>
        <!-- Lens -->
        <ellipse cx="14" cy="9" rx="4" ry="1.5"/>
        <!-- Light rays -->
        <path d="M10 7 L7 3" stroke-width="1.2"/>
        <path d="M14 6 L14 2" stroke-width="1.2"/>
        <path d="M18 7 L21 3" stroke-width="1.2"/>
        <path d="M8 9 L5 7" stroke-width="1.2"/>
        <path d="M20 9 L23 7" stroke-width="1.2"/>
        <!-- Button on handle -->
        <rect x="12.5" y="19" width="3" height="2" rx="1" opacity=".6"/>
      </svg>
    </span>
    <span class="mod-label">Gjennomlysning</span>
    <span class="mod-soon">Kommer</span>
  </button>

  <!-- Angiografi: bloddråpe -->
  <button class="mod-btn" onclick="setMod('an',this)" title="Angiografi">
    <span class="mod-icon">
      <svg viewBox="0 0 28 28" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <!-- Drop shape -->
        <path d="M14 3 C14 3 6 12 6 18 C6 22.4 9.6 26 14 26 C18.4 26 22 22.4 22 18 C22 12 14 3 14 3Z"/>
        <!-- Highlight -->
        <path d="M10 16 Q10 12 13 10" stroke-width="1.2" opacity=".5"/>
      </svg>
    </span>
    <span class="mod-label">Angiografi</span>
    <span class="mod-soon">Kommer</span>
  </button>
</div>

<!-- MOBILE TABBAR -->
<div class="mobile-tabbar">
  <button class="tabbtn on" id="mob-tab-pros" onclick="switchMobileTab('prosedyrer',this)">📋 Prosedyrer</button>
  <button class="tabbtn" id="mob-tab-logg" onclick="switchMobileTab('loggboker',this)">📒 Loggbøker</button>
</div>

<div class="main">
  <!-- PROSEDYRER TAB -->
  <div class="tab-panel on" id="tab-prosedyrer">
    <!-- LEFT PANEL with tabs on desktop -->
    <div class="left-panel">
      <div class="left-tabs">
        <button class="left-tab on" onclick="switchLeftTab('nav',this)">📋 Prosedyrer</button>
        <button class="left-tab" onclick="switchLeftTab('logg',this)">📒 Loggbøker</button>
      </div>

      <!-- NAV SECTION -->
      <div id="left-nav" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
        <div class="nav-top">
          <div class="ptabs">
            <button class="ptab on" onclick="setPt('voksen',this)">👤 Voksen</button>
            <button class="ptab" onclick="setPt('barn',this)">🧒 Barn</button>
            <button class="ptab" onclick="setPt('annet',this)">📁 Annet</button>
          </div>
          <div class="search-wrap">
            <svg class="sico" viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
            <input type="text" id="q" placeholder="Søk prosedyre…" oninput="render()">
          </div>
        </div>
        <div class="nav-body" id="nav-body"></div>
      </div>

      <!-- LOGG SECTION (desktop, inside left panel) -->
      <div id="left-logg" style="display:none;flex-direction:column;flex:1;overflow:hidden">
        <div class="logg-panel">
          <div class="labs-section">
            <div class="section-header">
              <div class="section-title">
                <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                Loggbøker
              </div>
            </div>
            <div class="lab-list" id="lab-list-desktop"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- VIEWER -->
    <div class="viewer">
      <div class="viewer-top">
        <span class="viewer-title empty" id="viewer-title">Velg en prosedyre fra listen</span>
      </div>
      <div class="viewer-body" id="viewer-body">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 6h13l11 11v25H14V6z"/><path d="M27 6v11h11"/><line x1="19" y1="22" x2="35" y2="22"/><line x1="19" y1="28" x2="35" y2="28"/><line x1="19" y1="34" x2="29" y2="34"/></svg>
          <p>Velg en prosedyre til venstre</p>
        </div>
      </div>
    </div>
  </div>

  <!-- MOBILE LOGG TAB -->
  <div class="tab-panel" id="tab-loggboker">
    <div class="logg-panel">
      <div class="labs-section">
        <div class="section-header">
          <div class="section-title">
            <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            Loggbøker
          </div>
        </div>
        <div class="lab-list" id="lab-list-mobile"></div>
      </div>
    </div>
  </div>

  <!-- COMING SOON TAB -->
  <div class="tab-panel" id="tab-soon">
    <div class="coming-soon">
      <div class="cs-icon" id="soon-icon">
        <svg viewBox="0 0 56 56" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="28" cy="28" r="22"/>

function toggleCat(id){
  const wasOpen=openCats[id];
  openCats[id]=!wasOpen;
  if(wasOpen&&CATS.find(c=>c.id===id)?.procs.some(p=>p.name===activeProc)){
    activeProc=null;
    document.getElementById('viewer-title').textContent='Velg en prosedyre fra listen';
    document.getElementById('viewer-title').className='viewer-title empty';
  }
  render();
}

function selectProc(name,url){
  activeProc=name;
  document.getElementById('viewer-title').textContent=name;
  document.getElementById('viewer-title').className='viewer-title';
  if(url&&url!=='null') window.open(url,'_blank');
  renderNav();
}

function hl(t,q){
  if(!q) return t;
  const i=t.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return t;
  return t.slice(0,i)+`<mark style="background:var(--mark-bg);border-radius:2px;padding:0 1px">`+t.slice(i,i+q.length)+'</mark>'+t.slice(i+q.length);
}

function visibleCats(q){
  return CATS.filter(c=>{
    if(c.pt!==pt) return false;
    if(q) return c.procs.some(p=>p.name.toLowerCase().includes(q.toLowerCase()));
    return true;
  });
}

function render(){ renderNav(); }

function renderNav(){
  const q=document.getElementById('q').value.trim();
  const cats=visibleCats(q);
  let html='';
  if(q){
    cats.forEach(c=>{ c.procs.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())).forEach(p=>{ html+=pRow(p,c,q,true); }); });
    if(!html) html=`<div class="no-results">Ingen treff for «${q}»</div>`;
  } else if(pt==='annet'){
    cats.forEach(c=>{ c.procs.forEach(p=>{ html+=pRow(p,c,'',true); }); });
  } else {
    cats.forEach(c=>{ html+=catBlock(c,q); });
  }
  document.getElementById('nav-body').innerHTML=html;
}

function catBlock(c,q){
  const show=openCats[c.id]||c.procs.some(p=>p.name===activeProc);
  const rows=c.procs.map(p=>pRow(p,c,q,false)).join('');
  return `<div>
    <div class="cat-row${show?' open':''}" onclick="toggleCat('${c.id}')">
      <span class="cat-bar" style="background:${c.color}"></span>
      <span class="cat-label">${c.label}</span>
      <span class="cat-count">${c.procs.length}</span>
      <svg class="cat-arr${show?' open':''}" viewBox="0 0 16 16"><polyline points="6,4 10,8 6,12"/></svg>
    </div>
    <div class="proc-rows" style="max-height:${show?'900px':'0'}">${rows}</div>
  </div>`;
}

function pRow(p,c,q,flat){
  const isAct=activeProc===p.name;
  const style=flat?'padding-left:8px':'';
  const safeUrl=p.url||'null';
  const safeName=p.name.replace(/'/g,"\\'");
  return `<div class="prow${isAct?' active':''}" style="${style}" onclick="selectProc('${safeName}','${safeUrl}')">
    <span class="${p.url?'has-link':'no-link'}"></span>
    <span class="pname">${hl(p.name,q)}</span>
  </div>`;
}
