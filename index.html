<!DOCTYPE html>
<html lang="no" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bildediagnostikk – Sykehuset Østfold</title>

<link rel="icon" type="image/x-icon" href="https://andreashov.github.io/rontgenprosedyrer/favicon/favicon.ico">
<link rel="icon" type="image/svg+xml" href="https://andreashov.github.io/rontgenprosedyrer/favicon/favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="https://andreashov.github.io/rontgenprosedyrer/favicon/favicon-96x96.png">
<link rel="apple-touch-icon" sizes="180x180" href="https://andreashov.github.io/rontgenprosedyrer/favicon/apple-touch-icon.png">

<style>

</style>
</head>

<body>

<!-- ===== HTML BEHOLDT HELT UENDRET ===== -->
<!-- (Alt fra topbar → sections er identisk som i din versjon) -->

<script>
const RG_CATS=[ /* --- uendret --- */ ];
const RG_LABS=[ /* --- uendret --- */ ];

const CT_PROT={
  voksen:[
    {id:'prot-caput',label:'Caput',procs:[]},
    {id:'prot-collum',label:'Collum',procs:[]},
    {id:'prot-thorax',label:'Thorax',procs:[]},
    {id:'prot-abdomen',label:'Abdomen',procs:[]},
    {id:'prot-skjelett',label:'Skjelett',procs:[]},
    {id:'prot-angio',label:'Angio',procs:[]}
  ],
  barn:[
    {id:'prot-barn-caput',label:'Caput',procs:[]},
    {id:'prot-barn-collum',label:'Collum',procs:[]},
    {id:'prot-barn-thorax',label:'Thorax',procs:[]},
    {id:'prot-barn-abdomen',label:'Abdomen',procs:[]},
    {id:'prot-barn-skjelett',label:'Skjelett',procs:[]},
    {id:'prot-barn-angio',label:'Angio',procs:[]}
  ]
};

let activeMod='rg';
let pt='voksen';
let activeCatId=null;
let activeProc=null;

let protPt='voksen';
let activeProtCatId=null;

/* ================= THEME ================= */
const root=document.documentElement;
root.setAttribute('data-theme',localStorage.getItem('so-theme')||'dark');

/* ================= MODALITET ================= */
function setMod(mod,btn){
  activeMod=mod;

  document.querySelectorAll('.mod-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');

  ['rg','ct','other'].forEach(id=>{
    const el=document.getElementById('sub-tabs-'+id);
    if(el) el.style.display='none';
  });

  if(mod==='rg'){
    document.getElementById('sub-tabs-rg').style.display='flex';
    showSection('pros');
    renderCatGrid();
  }

  else if(mod==='ct'){
    document.getElementById('sub-tabs-ct').style.display='flex';

    // default state
    protPt='voksen';
    activeProtCatId=null;

    document.querySelectorAll('#prot-pt-tabs-bar .ptab')
      .forEach(b=>b.classList.remove('on'));

    document.getElementById('prot-ptab-voksen').classList.add('on');

    showSection('prot');
    renderProtGrid(); // 🔑 viktig fix
  }

  else {
    document.getElementById('sub-tabs-other').style.display='flex';
    showSection('soon');
  }
}

/* ================= CT ================= */

function setProtPt(val,btn){
  protPt=val;
  activeProtCatId=null;

  document.querySelectorAll('#prot-pt-tabs-bar .ptab')
    .forEach(b=>b.classList.remove('on'));

  btn.classList.add('on');

  renderProtGrid();
}

function renderProtGrid(){
  const cats=CT_PROT[protPt]||[];

  document.getElementById('prot-grid').innerHTML=cats.map(c=>`
    <div class="cat-card" onclick="openProtCat('${c.id}')">
      <div class="cat-card-bar"></div>
      <div class="cat-card-label">${c.label}</div>
      <div class="cat-card-count">Ingen protokoller enda</div>
    </div>
  `).join('');

  document.getElementById('prot-cat-grid-view').style.display='block';
  document.getElementById('prot-proc-view').classList.remove('active');
}

function openProtCat(id){
  activeProtCatId=id;

  const cat=CT_PROT[protPt].find(c=>c.id===id);
  if(!cat) return;

  document.getElementById('prot-back-cat-name').textContent=cat.label;

  renderProtList(cat);

  document.getElementById('prot-cat-grid-view').style.display='none';
  document.getElementById('prot-proc-view').classList.add('active');
}

function renderProtList(cat){
  const list=document.getElementById('prot-proc-list');

  if(cat.procs.length){
    list.innerHTML=cat.procs.map(p=>`
      <div class="prow" onclick="window.open('${p.url}','_blank')">
        <span class="has-link"></span>
        <span class="pname">${p.name}</span>
      </div>
    `).join('');
  } else {
    list.innerHTML=`<div class="no-results">Ingen protokoller lagt inn ennå</div>`;
  }
}

function goBackProt(){
  activeProtCatId=null;
  renderProtGrid();
}

/* ================= INIT ================= */
renderCatGrid();
renderProtGrid();

</script>

</body>
</html>
