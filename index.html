<!DOCTYPE html>
<html lang="no" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bildediagnostikk – Sykehuset Østfold</title>
<style>
:root{
  --bg:#f0f4f9;--surface:#fff;--surface2:#f7f9fc;--border:#dde3ec;
  --text:#0d1b2e;--text2:#4a5a72;--text3:#8a97aa;
  --accent:#1a4f8a;--accent-light:#dbeafe;--dot-empty:#c8d4e3;
  --mark-bg:#fef08a;--shadow:0 1px 4px rgba(0,0,0,.07);
  --shadow-md:0 4px 16px rgba(0,0,0,.10);
}
[data-theme="dark"]{
  --bg:#0c1520;--surface:#111e2e;--surface2:#162030;--border:#1e3045;
  --text:#e8edf5;--text2:#94a8c0;--text3:#4a6070;
  --accent:#4a9de0;--accent-light:#1a2d45;--dot-empty:#2a3d52;
  --mark-bg:#78530a;--shadow:0 1px 6px rgba(0,0,0,.3);
  --shadow-md:0 4px 20px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:10px;padding:0 12px;height:46px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.logo-wrap{display:flex;align-items:center;gap:7px}
.logo-text{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.04em;text-transform:uppercase}
.logo-sub{font-size:8px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.topbar-right{margin-left:auto}
.theme-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.theme-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

/* FIXED HEADER AREA */
.fixed-header{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border)}

/* MODALITET BAR */
.modalitet-bar{display:flex;gap:4px;padding:8px 10px;border-bottom:1px solid var(--border)}
.mod-btn{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:2px;padding:0 0 5px 0;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .15s;flex:1;min-width:0;height:70px;overflow:hidden;position:relative}
.mod-btn:hover{border-color:var(--accent)}
.mod-btn.on{border-color:var(--accent);box-shadow:0 2px 8px rgba(26,79,138,.3)}
.mod-img-wrap{position:absolute;top:0;left:0;right:0;bottom:22px;overflow:hidden;border-radius:7px 7px 0 0}
.mod-btn:hover{border-color:var(--accent);background:var(--accent-light)}
.mod-btn.on{background:var(--accent);border-color:var(--accent)}
.mod-img{width:100%;height:100%;object-fit:cover;border-radius:6px;opacity:.8;transition:opacity .15s,filter .15s;display:block}
.mod-btn.on .mod-img{opacity:1;filter:brightness(10)}
.mod-label{font-size:9px;font-weight:600;color:var(--text2);text-align:center;line-height:1.2;transition:color .15s;word-break:break-word;hyphens:auto;max-width:100%}
.mod-btn.on .mod-label{color:#fff}

/* SUB-TABS (Prosedyrer / Loggbøker / Protokoller) */
.sub-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 10px;background:var(--surface2)}
.sub-tab{padding:8px 12px;font-size:11px;font-weight:600;color:var(--text3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.sub-tab.on{color:var(--accent);border-bottom-color:var(--accent)}

/* PT TABS */
.pt-tabs-bar{display:flex;gap:5px;padding:8px 10px;border-bottom:1px solid var(--border);background:var(--surface)}
.ptab{flex:1;padding:7px 0;border-radius:7px;border:1.5px solid var(--border);background:var(--surface2);font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .15s;text-align:center}
.ptab:hover{border-color:var(--accent);color:var(--accent)}
.ptab.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* SEARCH BAR */
.search-bar{padding:7px 10px;border-bottom:1px solid var(--border);background:var(--surface)}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:7px 10px 7px 32px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface2);font-size:16px;color:var(--text);outline:none;height:34px}
.search-wrap input::placeholder{color:var(--text3);font-size:13px}
.search-wrap input:focus{border-color:var(--accent)}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--text3);fill:none;stroke-width:2;pointer-events:none}

/* SCROLLABLE CONTENT */
.scroll-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll-content::-webkit-scrollbar{width:3px}
.scroll-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* MAIN LAYOUT */
.main{display:flex;flex:1;overflow:hidden}
.left-panel{width:300px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border);background:var(--surface)}
.viewer{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.viewer-top{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;min-height:46px}
.viewer-title{font-size:13px;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.viewer-title.empty{color:var(--text3);font-weight:400}
.viewer-body{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.empty-state{display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--text3);padding:2rem}
.empty-state svg{opacity:.4;stroke:var(--text3)}
.empty-state p{font-size:13px;text-align:center;line-height:1.6}

/* DESKTOP TABS inside left-panel */
.left-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0}
.left-tab{flex:1;padding:9px 6px;font-size:11px;font-weight:600;color:var(--text3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;text-align:center}
.left-tab.on{color:var(--accent);border-bottom-color:var(--accent);background:var(--surface)}

/* CATEGORY GRID */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px}
.cat-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 10px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:4px;min-height:64px;position:relative;overflow:hidden}
.cat-card:hover{background:var(--accent-light);border-color:var(--accent)}
.cat-card-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.cat-card-label{font-size:12px;font-weight:700;color:var(--text);line-height:1.3;margin-top:4px}
.cat-card-count{font-size:10px;color:var(--text3)}

/* PROC LIST VIEW */
.proc-view{display:none;flex-direction:column;flex:1;overflow:hidden}
.proc-view.active{display:flex}
.back-bar{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0}
.back-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface);font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.back-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5}
.back-cat-name{font-size:12px;font-weight:700;color:var(--text);flex:1}
.prow{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border);min-height:44px}
.prow:hover{background:var(--surface2)}
.prow.active{background:var(--accent-light)}
.pname{font-size:13px;color:var(--text2);flex:1;line-height:1.35}
.prow.active .pname{color:var(--accent);font-weight:600}
.has-link{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;opacity:.7}
.no-link{width:5px;height:5px;border-radius:50%;background:var(--dot-empty);flex-shrink:0}
.no-results{padding:2rem 10px;text-align:center;font-size:13px;color:var(--text3)}

/* LOGGBØKER GRID */
.logg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px}
.lab-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:14px 10px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;text-align:center;min-height:52px}
.lab-card:hover{background:var(--accent-light);border-color:var(--accent)}
.lab-card-name{font-size:13px;font-weight:700;color:var(--text)}

/* COMING SOON */
.coming-soon{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text3);padding:2rem;text-align:center}
.coming-soon svg{opacity:.35;stroke:var(--text3)}
.coming-soon h2{font-size:15px;font-weight:600;color:var(--text2)}
.coming-soon p{font-size:12px;line-height:1.6;max-width:260px}

/* PANEL SECTIONS */
.panel-section{display:none;flex-direction:column;flex:1;overflow:hidden}
.panel-section.active{display:flex}

/* RESPONSIVE DESKTOP */
@media(min-width:641px){
  .mobile-tabbar{display:none!important}
  .left-panel .pt-tabs-bar,.left-panel .search-bar{display:flex;flex-direction:column}
}
@media(max-width:900px){.left-panel{width:250px}}

/* MOBILE */
@media(max-width:640px){
  body{overflow:auto;height:auto;min-height:100vh}
  .main{flex-direction:column;overflow:visible}
  .left-panel{width:100%;border-right:none;border-bottom:1px solid var(--border)}
  .left-tabs{display:none!important}
  .viewer{display:none}
  .viewer-top{display:none}
  .mobile-tabbar{display:flex!important}
}

/* COMPACT */
body.compact{overflow:auto;height:auto;min-height:100vh;width:100%;max-width:480px;margin:0 auto}
body.compact .main{flex-direction:column;overflow:visible}
body.compact .left-panel{width:100%;border-right:none}
body.compact .left-tabs{display:none!important}
body.compact .viewer{display:none}
body.compact .mobile-tabbar{display:flex!important}

/* MOBILE TABBAR */
.mobile-tabbar{display:none;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;padding:0 10px}
.tabbtn{padding:9px 14px;font-size:12px;font-weight:600;color:var(--text3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tabbtn.on{color:var(--accent);border-bottom-color:var(--accent)}
</style>
</head>

// ── STATE ─────────────────────────────────────────────────────────────────
let pt='voksen', activeMod='rg', activeSubTab='pros', activeCatId=null, activeProc=null, searchMode=false;

// ── COMPACT ───────────────────────────────────────────────────────────────
if(new URLSearchParams(window.location.search).get('mode')==='compact')
  document.body.classList.add('compact');

// ── THEME ─────────────────────────────────────────────────────────────────
const root=document.documentElement;
const savedTheme=localStorage.getItem('so-theme')||'light';
root.setAttribute('data-theme',savedTheme);
updateThemeIcon(savedTheme);
function toggleTheme(){
  const next=root.getAttribute('data-theme')==='light'?'dark':'light';
  root.setAttribute('data-theme',next);
  localStorage.setItem('so-theme',next);
  updateThemeIcon(next);
}
function updateThemeIcon(t){
  document.getElementById('theme-ico').innerHTML=t==='dark'
    ?'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    :'<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
}

// ── MODALITET ─────────────────────────────────────────────────────────────
function setMod(mod, btn){
  activeMod=mod;
  document.querySelectorAll('.mod-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  // Hide all sub-tabs
  document.getElementById('sub-tabs-rg').style.display='none';
  document.getElementById('sub-tabs-ct').style.display='none';
  if(mod==='rg'){
    document.getElementById('sub-tabs-rg').style.display='flex';
    // Reset to prosedyrer
    const firstTab=document.querySelector('#sub-tabs-rg .sub-tab');
    setSubTab('rg','pros',firstTab);
  } else if(mod==='ct'){
    document.getElementById('sub-tabs-ct').style.display='flex';
    const firstTab=document.querySelector('#sub-tabs-ct .sub-tab');
    setSubTab('ct','prot',firstTab);
  } else {
    showSection('soon');
    hidePtAndSearch();
    document.getElementById('soon-title').textContent={ul:'Ultralyd',gj:'Gjennomlysning',an:'Angiografi'}[mod];
    document.getElementById('soon-text').textContent=`Prosedyrer for denne modaliteten er under utarbeidelse.`;
  }
}

// ── SUB TABS ──────────────────────────────────────────────────────────────
function setSubTab(mod, tab, btn){
  activeSubTab=tab;
  const bar=document.getElementById(`sub-tabs-${mod}`);
  bar.querySelectorAll('.sub-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(tab==='pros'){
    showSection('pros');
    showPtAndSearch(true);
    activeCatId=null; searchMode=false;
    document.getElementById('q').value='';
    renderCatGrid();
    showCatView();
  } else if(tab==='logg'){
    showSection('logg');
    hidePtAndSearch();
    renderLogg();
  } else if(tab==='prot'){
    showSection('prot');
    hidePtAndSearch();
  }
}

// ── SECTIONS ──────────────────────────────────────────────────────────────
function showSection(id){
  document.querySelectorAll('.panel-section').forEach(s=>s.classList.remove('active'));
  document.getElementById('section-'+id).classList.add('active');
}
function showPtAndSearch(show){
  document.getElementById('pt-tabs-bar').style.display=show?'flex':'none';
  document.getElementById('search-bar').style.display=show?'block':'none';
}
function hidePtAndSearch(){ showPtAndSearch(false); }

// ── LEFT PANEL DESKTOP TABS ───────────────────────────────────────────────
function switchLeftTab(which, btn){
  document.querySelectorAll('.left-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(which==='pros'){
    setSubTab('rg','pros', document.querySelector('#sub-tabs-rg .sub-tab'));
    document.getElementById('sub-tabs-rg').style.display='flex';
    document.getElementById('sub-tabs-ct').style.display='none';
  } else {
    showSection('logg');
    hidePtAndSearch();
    renderLogg();
    document.getElementById('sub-tabs-rg').style.display='none';
    document.getElementById('sub-tabs-ct').style.display='none';
  }
}

// ── MOBILE TABS ───────────────────────────────────────────────────────────
function switchMobileTab(which, btn){
  document.querySelectorAll('.tabbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(which==='pros'){
    showSection('pros');
    showPtAndSearch(true);
    renderCatGrid(); showCatView();
  } else {
    showSection('logg');
    hidePtAndSearch();
    renderLogg();
  }
}

// ── PT TABS ───────────────────────────────────────────────────────────────
function setPt(val, btn){
  pt=val; activeCatId=null; activeProc=null; searchMode=false;
  document.getElementById('q').value='';
  document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderCatGrid();
  showCatView();
}

// ── CATEGORY GRID ─────────────────────────────────────────────────────────
function renderCatGrid(){
  const cats=CATS.filter(c=>c.pt===pt);
  if(pt==='annet'){
    // Show procs directly for "annet"
    const cat=cats[0];
    if(cat) openCategory(cat.id);
    return;
  }
  const html=cats.map(c=>`
    <div class="cat-card" onclick="openCategory('${c.id}')">
      <div class="cat-card-bar" style="background:${c.color}"></div>
      <div class="cat-card-label">${c.label}</div>
      <div class="cat-card-count">${c.procs.length} prosedyrer</div>
    </div>`).join('');
  document.getElementById('cat-grid').innerHTML=html;
}

function showCatView(){
  document.getElementById('cat-grid-view').style.display='block';
  document.getElementById('proc-view').classList.remove('active');
}

function openCategory(id){
  activeCatId=id;
  const cat=CATS.find(c=>c.id===id);
  if(!cat) return;
  document.getElementById('back-cat-name').textContent=cat.label;
  renderProcList(cat.procs, '');
  document.getElementById('cat-grid-view').style.display='none';
  document.getElementById('proc-view').classList.add('active');
}

function goBack(){
  activeCatId=null; activeProc=null;
  renderCatGrid();
  showCatView();
}

function renderProcList(procs, q){
  const html=procs.map(p=>{
    const isAct=activeProc===p.name;
    const safeName=p.name.replace(/'/g,"\\'");
    const safeUrl=p.url||'null';
    const nameHtml=q?hl(p.name,q):p.name;
    return `<div class="prow${isAct?' active':''}" onclick="selectProc('${safeName}','${safeUrl}')">
      <span class="${p.url?'has-link':'no-link'}"></span>
      <span class="pname">${nameHtml}</span>
    </div>`;
  }).join('');
  document.getElementById('proc-list').innerHTML=html||`<div class="no-results">Ingen treff</div>`;
}

// ── SEARCH ────────────────────────────────────────────────────────────────
function onSearch(){
  const q=document.getElementById('q').value.trim();
  if(q){
    searchMode=true;
    // Search across all cats in current pt
    const cats=CATS.filter(c=>c.pt===pt);
    const results=[];
    cats.forEach(c=>{ c.procs.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())).forEach(p=>results.push(p)); });
    document.getElementById('back-cat-name').textContent='Søkeresultater';
    renderProcList(results, q);
    document.getElementById('cat-grid-view').style.display='none';
    document.getElementById('proc-view').classList.add('active');
    // Override back button to clear search
    document.querySelector('.back-btn').onclick=()=>{
      document.getElementById('q').value='';
      searchMode=false; activeCatId=null;
      renderCatGrid(); showCatView();
      document.querySelector('.back-btn').onclick=goBack;
    };
  } else {
    searchMode=false;
    renderCatGrid(); showCatView();
    document.querySelector('.back-btn').onclick=goBack;
  }
}

// ── SELECT PROC ───────────────────────────────────────────────────────────
function selectProc(name, url){
  activeProc=name;
  document.getElementById('viewer-title').textContent=name;
  document.getElementById('viewer-title').className='viewer-title';
  if(url&&url!=='null') window.open(url,'_blank');
  // Re-render proc list to show active state
  if(activeCatId){
    const cat=CATS.find(c=>c.id===activeCatId);
    if(cat) renderProcList(cat.procs,'');
  }
}

function hl(t,q){
  if(!q) return t;
  const i=t.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return t;
  return t.slice(0,i)+`<mark style="background:var(--mark-bg);border-radius:2px;padding:0 1px">`+t.slice(i,i+q.length)+'</mark>'+t.slice(i+q.length);
}

// ── LOGG ──────────────────────────────────────────────────────────────────
function renderLogg(){
  const html=LABS.map(l=>`
    <div class="lab-card" onclick="window.open('${l.url}','_blank')">
      <div class="lab-card-name">${l.name}</div>
    </div>`).join('');
  document.getElementById('logg-grid').innerHTML=html;
}

// ── INIT ──────────────────────────────────────────────────────────────────
// Start on røntgen / prosedyrer
document.getElementById('sub-tabs-rg').style.display='flex';
document.getElementById('left-tabs').style.display='flex';
document.getElementById('mobile-tabbar').style.display='flex';
showPtAndSearch(true);
renderCatGrid();
renderLogg();
